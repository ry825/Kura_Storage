name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  config:
    name: Config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install configuration validation tools
        run: sudo apt-get update && sudo apt-get install --yes ripgrep shellcheck
      - name: Verify repository configuration
        run: ./scripts/ci/verify-config.sh

  server:
    name: Server
    runs-on: ubuntu-latest
    env:
      NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: server/**/packages.lock.json
      - name: Verify server
        run: ./scripts/ci/verify-server.sh

  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install security validation tools
        run: sudo apt-get update && sudo apt-get install --yes ripgrep
      - name: Verify repository security policy
        run: ./scripts/ci/verify-security.sh

  android:
    name: Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v4
      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-36" "build-tools;35.0.0"
      - uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}
      - name: Verify Android
        run: ./scripts/ci/verify-android.sh
